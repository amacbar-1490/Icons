<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="Maximum Effort">
<meta name="theme-color" content="#080808">
<!-- Icon is same-origin (GitHub Pages) — Safari reads this correctly -->

<title>Maximum Effort</title>
<style>
  *, html, body { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #080808;
    overflow: hidden;
  }
  iframe {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }
</style>
</head>
<body>
<!--
  SETUP: Replace YOUR_ME_SCRIPT_ID with the Script ID from
  Maximum Effort Apps Script project → Project Settings → Script ID.
  The GAS app must have setXFrameOptionsMode(ALLOWALL) — it already does.
-->
<iframe
  src="https://script.google.com/macros/s/1ZejCINmyANyPfkq_QF-UmqE2Lga_l_YpX8cGZp_lss6EO8Rimi5MoNgp/exec"
  allowfullscreen
  allow="clipboard-write">
